<div class="prop-panel-inner">
  <div class="prop-panel-header">
    <h2 id="prop-title" class="prop-panel-title"></h2>
  </div>
  <div class="prop-panel-body">

    <div id="prop-section-position" class="prop-section">
      <div class="prop-section-label">Position</div>
      <div id="prop-pos-x-row" class="prop-row">
        <span class="prop-axis-label">X</span>
      </div>
      <div id="prop-pos-y-row" class="prop-row">
        <span class="prop-axis-label">Y</span>
      </div>
      <div id="prop-pos-z-row" class="prop-row">
        <span class="prop-axis-label">Z</span>
      </div>
    </div>

    <div id="prop-section-rotation" class="prop-section">
      <div class="prop-section-label">Rotation (deg)</div>
      <div id="prop-rot-yaw-row" class="prop-row">
        <span class="prop-axis-label">Y</span>
      </div>
      <div id="prop-rot-pitch-row" class="prop-row">
        <span class="prop-axis-label">P</span>
      </div>
      <div id="prop-rot-roll-row" class="prop-row">
        <span class="prop-axis-label">R</span>
      </div>
    </div>

    <div id="prop-section-color" class="prop-section">
      <div class="prop-section-label">Color (hex)</div>
      <div id="prop-color-row" class="prop-color-row">
        <span class="prop-color-prefix">#</span>
        <div id="prop-color-swatch" class="prop-color-swatch"></div>
      </div>
    </div>

    <div id="prop-section-scale" class="prop-section">
      <div class="prop-section-label">Scale</div>
      <div id="prop-scale-x-row" class="prop-row">
        <span class="prop-axis-label">X</span>
      </div>
      <div id="prop-scale-y-row" class="prop-row">
        <span class="prop-axis-label">Y</span>
      </div>
      <div id="prop-scale-z-row" class="prop-row">
        <span class="prop-axis-label">Z</span>
      </div>
    </div>

    <div id="prop-section-physics" class="prop-section">
      <div class="prop-section-label">Physics</div>
      <div id="prop-rb-row" class="prop-row">
        <span class="prop-label">Rigidbody</span>
      </div>
      <div id="prop-static-row" class="prop-row prop-subrow" style="display:none">
        <span class="prop-label">Static</span>
      </div>
      <div id="prop-hb-row" class="prop-row">
        <span class="prop-label">Hitbox</span>
      </div>
      <div id="prop-layer-row" class="prop-row prop-subrow" style="display:none">
        <span class="prop-label">Layer</span>
      </div>
    </div>

    <div id="prop-section-asset" class="prop-section">
      <div class="prop-section-label">Asset</div>
      <div id="prop-asset-select-row" class="prop-row">
      </div>
    </div>

    <div id="prop-section-light" class="prop-section">
      <div class="prop-section-label">Light</div>
      <div id="prop-light-type-row" class="prop-row">
        <span class="prop-label">Type</span>
      </div>
      <div id="prop-radius-row" class="prop-row prop-subrow">
        <span class="prop-label">Radius</span>
      </div>
      <div id="prop-power-row" class="prop-row">
        <span class="prop-label">Power</span>
      </div>
    </div>

  </div>
</div>
