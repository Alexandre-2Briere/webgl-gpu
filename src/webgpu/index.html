<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alexandre Briere | WebGPU Demo</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
    <style>
        /* ── Help overlay ─────────────────────────────────────────────────── */
        .help-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 24px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }

        .help-box {
            width: 300px;
            max-width: 80vw;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 8px;
            padding: 16px 20px;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }

        .help-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .help-title {
            color: #e0e0e0;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.1em;
        }

        .help-close {
            background: none;
            border: none;
            color: #888;
            font-family: monospace;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            padding: 0;
        }

        .help-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .help-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .help-badge {
            color: #44aaff;
            font-family: monospace;
            font-size: 11px;
            background: rgba(68, 170, 255, 0.12);
            border-radius: 4px;
            padding: 2px 8px;
            min-width: 68px;
            text-align: center;
            flex-shrink: 0;
        }

        .help-desc {
            color: #b0b0b0;
            font-family: monospace;
            font-size: 11px;
        }

        .help-hint {
            color: #555;
            font-family: monospace;
            font-size: 10px;
            margin-top: 14px;
            text-align: center;
        }
        /* ─────────────────────────────────────────────────────────────────── */
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>

    <template id="help-overlay-template">
        <div class="help-overlay">
            <div class="help-box">
                <div class="help-header">
                    <span class="help-title">CONTROLS</span>
                    <button class="help-close" title="Close (H)">&#x00D7;</button>
                </div>
                <div class="help-list">
                    <!-- rows injected by HelpOverlay -->
                </div>
                <div class="help-hint">
                    <!-- filled by HelpOverlay -->
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="/src/webgpu/modules/marchingCubes/module.ts"></script>
</body>
</html>
